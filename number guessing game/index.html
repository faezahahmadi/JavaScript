<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Number Guessing Game</h1>
      <label for="number">Guess a number between 1 to 100: </label><br />
      <input type="number" name="number" id="number" placeholder="eg. 10" />
      <button id="btn">Guess</button>
      <div class="attempts">
        <p>Your Attempts:</p>
        <p id="attemptsText"></p>
      </div>
      <h3 id="hint"></h3>
    </div>
  </body>
  <script src="index.js"></script>
</html>
